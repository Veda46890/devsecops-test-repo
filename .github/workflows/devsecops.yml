name: DevSecOps Security Pipeline

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # =========================================================
  # SAST - SEMGREP
  # =========================================================

  sast-semgrep:

    name: SAST Security Scan

    runs-on: ubuntu-latest

    steps:

      # =====================================
      # CHECKOUT REPOSITORY
      # =====================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================
      # INSTALL SEMGREP
      # =====================================

      - name: Install Semgrep
        run: |

          python3 -m pip install semgrep

      # =====================================
      # RUN SEMGREP SCAN
      # =====================================

      - name: Run Semgrep Scan
        run: |

          semgrep scan \
            --config=auto \
            --json \
            --output semgrep-report.json

      # =====================================
      # INSTALL JQ
      # =====================================

      - name: Install jq
        run: |

          sudo apt-get update

          sudo apt-get install -y jq

      # =====================================
      # SECURITY GATE POLICY
      # FAIL PIPELINE IF HIGH/CRITICAL
      # =====================================

      - name: SAST Security Gate
        run: |

          CRITICAL=$(cat semgrep-report.json | jq '[.results[] | select(.extra.severity=="ERROR")] | length')

          HIGH=$(cat semgrep-report.json | jq '[.results[] | select(.extra.severity=="WARNING")] | length')

          echo "===================================="

          echo "SEMGRP SECURITY RESULTS"

          echo "===================================="

          echo "Critical Findings: $CRITICAL"

          echo "High Findings: $HIGH"

          echo "===================================="

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then

            echo "SAST SECURITY GATE FAILED"

            exit 1

          fi

      # =====================================
      # UPLOAD SEMGREP REPORT
      # =====================================

      - name: Upload SAST Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-report.json

  # =========================================================
  # SCA - TRIVY FILESYSTEM SCAN
  # =========================================================

  sca-trivy:

    name: SCA Security Scan

    runs-on: ubuntu-latest

    steps:

      # =====================================
      # CHECKOUT REPOSITORY
      # =====================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================
      # RUN TRIVY SCA SCAN
      # =====================================

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy-report.json

      # =====================================
      # INSTALL JQ
      # =====================================

      - name: Install jq
        run: |

          sudo apt-get update

          sudo apt-get install -y jq

      # =====================================
      # SECURITY GATE POLICY
      # FAIL IF HIGH/CRITICAL FOUND
      # =====================================

      - name: SCA Security Gate
        run: |

          CRITICAL=$(cat trivy-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')

          HIGH=$(cat trivy-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')

          echo "===================================="

          echo "TRIVY SECURITY RESULTS"

          echo "===================================="

          echo "Critical Findings: $CRITICAL"

          echo "High Findings: $HIGH"

          echo "===================================="

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then

            echo "SCA SECURITY GATE FAILED"

            exit 1

          fi

      # =====================================
      # UPLOAD TRIVY REPORT
      # =====================================

      - name: Upload SCA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-report
          path: trivy-report.json

  # =========================================================
  # SECURITY PIPELINE SUMMARY
  # =========================================================

  security-summary:

    name: Security Pipeline Summary

    runs-on: ubuntu-latest

    needs:
      - sast-semgrep
      - sca-trivy

    if: always()

    steps:

      - name: Security Summary
        run: |

          echo "======================================"

          echo "DEVSECOPS SECURITY PIPELINE COMPLETED"

          echo "======================================"

          echo "SAST : Semgrep Completed"

          echo "SCA  : Trivy Completed"

          echo "======================================"
